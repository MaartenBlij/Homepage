<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maarten van der Blij</title>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --papier: #f5f0e8;
      --lijn: #c8bfa8;
      --potlood: #3a3530;
      --accent: #d45f2e;
      --licht-accent: #f0d5c5;
      --blauw: #2c5f8a;
      --groen: #3a7d44;
      --schets-lijn: 2px solid #9e9085;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e8e2d6;
      font-family: 'Courier Prime', monospace;
      color: var(--potlood);
      min-height: 100vh;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 27px,
        rgba(180,160,130,0.2) 27px,
        rgba(180,160,130,0.2) 28px
      );
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ── HEADER ── */
    .header {
      background: var(--papier);
      border: var(--schets-lijn);
      border-radius: 4px;
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: relative;
      box-shadow: 4px 4px 0 var(--lijn);
    }

    .avatar-box {
      width: 80px;
      height: 80px;
      border: var(--schets-lijn);
      border-radius: 50%;
      background: var(--licht-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .avatar-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .header-info h1 {
      font-family: 'Permanent Marker', cursive;
      font-size: 26px;
      color: var(--accent);
      line-height: 1.1;
    }

    .header-info .tagline {
      font-size: 13px;
      color: #6b6055;
      margin-top: 4px;
      font-style: italic;
    }

    /* ── SECTIES ── */
    .sectie {
      background: var(--papier);
      border: var(--schets-lijn);
      border-radius: 3px;
      margin-bottom: 20px;
      box-shadow: 4px 4px 0 var(--lijn);
      overflow: hidden;
    }

    .sectie-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: var(--schets-lijn);
      background: white;
    }

    .sectie-icon {
      font-size: 20px;
    }

    .sectie-titel {
      font-family: 'Permanent Marker', cursive;
      font-size: 18px;
      color: var(--potlood);
    }

    .sectie-body {
      padding: 16px;
    }

    .placeholder {
      color: var(--lijn);
      font-style: italic;
      font-size: 13px;
    }

    /* ── PLATENKAST ── */
    .platenkast-grid {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .platenkast-grid::-webkit-scrollbar {
      height: 6px;
    }

    .platenkast-grid::-webkit-scrollbar-track {
      background: var(--licht-accent);
    }

    .platenkast-grid::-webkit-scrollbar-thumb {
      background: var(--lijn);
      border-radius: 3px;
    }

    .plaat-kaart {
      flex: 0 0 auto;
      width: 160px;
      text-align: left;
    }

    .plaat-cover-wrap {
      width: 160px;
      height: 160px;
      border: var(--schets-lijn);
      background: var(--licht-accent);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .plaat-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .plaat-cover-placeholder {
      font-size: 40px;
      opacity: 0.4;
    }

    .plaat-info {
      margin-top: 7px;
    }

    .plaat-artiest {
      font-size: 12px;
      font-weight: bold;
      color: var(--potlood);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .plaat-titel {
      font-size: 11px;
      color: #6b6055;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .plaat-jaar {
      font-size: 10px;
      color: var(--lijn);
      margin-top: 2px;
    }

    /* ── RECENTE ACTIVITEIT ── */
    .activiteit-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--potlood);
      color: var(--papier);
    }

    .activiteit-header-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .activiteit-header-icoon {
      font-size: 16px;
      opacity: 0.75;
    }

    .activiteit-header-titel {
      font-family: 'Permanent Marker', cursive;
      font-size: 18px;
      color: var(--papier);
      font-style: italic;
    }

    .activiteit-nav {
      display: flex;
      gap: 6px;
    }

    .activiteit-nav-btn {
      padding: 4px 14px;
      font-family: 'Courier Prime', monospace;
      font-size: 13px;
      border-radius: 3px;
      cursor: pointer;
      border: 1.5px solid rgba(245,240,232,0.5);
      background: transparent;
      color: var(--licht-accent);
    }

    .activiteit-nav-btn.actief {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .activiteit-tabs {
      display: flex;
      padding: 0 8px;
      border-bottom: var(--schets-lijn);
      background: var(--papier);
    }

    .activiteit-tab {
      padding: 10px 12px;
      font-family: 'Courier Prime', monospace;
      font-size: 13px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
      cursor: pointer;
      color: #6b6055;
      white-space: nowrap;
    }

    .activiteit-tab.actief {
      color: var(--potlood);
      border-bottom-color: var(--accent);
    }

    .activiteit-item {
      display: flex;
      gap: 14px;
      padding: 16px;
      border-bottom: 1px dashed var(--lijn);
    }

    .activiteit-item:last-child {
      border-bottom: none;
    }

    .activiteit-icoon {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: var(--licht-accent);
      border: var(--schets-lijn);
      border-radius: 3px;
    }

    .activiteit-content {
      flex: 1;
      min-width: 0;
    }

    .activiteit-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .activiteit-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-style: italic;
    }

    .activiteit-badge.blog     { background: #ddeeff; color: var(--blauw); }
    .activiteit-badge.platenkast { background: #ebe5d8; color: #7a6050; }
    .activiteit-badge.film     { background: #fef3cc; color: #9a7000; }
    .activiteit-badge.recept   { background: #d8eedd; color: var(--groen); }

    .activiteit-tijd {
      font-size: 12px;
      color: #9e9085;
      font-style: italic;
    }

    .activiteit-titel {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 5px;
    }

    .activiteit-beschrijving {
      font-size: 13px;
      color: #4a4540;
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .activiteit-link {
      font-size: 13px;
      color: var(--blauw);
      text-decoration: none;
      font-style: italic;
    }

    .activiteit-link:hover { text-decoration: underline; }

    .activiteit-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .activiteit-tag {
      padding: 2px 8px;
      background: white;
      border: 1px solid var(--lijn);
      border-radius: 3px;
      font-size: 11px;
      color: #6b6055;
    }

    .activiteit-sterren {
      color: #d4a017;
      font-size: 16px;
      letter-spacing: 1px;
    }

    /* ── BLOG ── */
    .blog-item {
      padding: 14px 0;
      border-bottom: 1px dashed var(--lijn);
      cursor: pointer;
    }

    .blog-item:last-child { border-bottom: none; }

    .blog-item:hover .blog-item-titel { color: var(--blauw); text-decoration: underline; }

    .blog-item-datum {
      font-size: 11px;
      color: #9e9085;
      font-style: italic;
      margin-bottom: 4px;
    }

    .blog-item-titel {
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 5px;
    }

    .blog-item-excerpt {
      font-size: 13px;
      color: #4a4540;
      line-height: 1.55;
    }

    .blog-item-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .blog-post-inhoud {
      font-size: 14px;
      line-height: 1.75;
      color: var(--potlood);
    }

    .blog-post-inhoud h1, .blog-post-inhoud h2, .blog-post-inhoud h3 {
      font-family: 'Permanent Marker', cursive;
      margin: 20px 0 8px;
    }

    .blog-post-inhoud p { margin-bottom: 14px; }

    .blog-post-inhoud a { color: var(--blauw); }

    .blog-post-inhoud ul, .blog-post-inhoud ol {
      margin: 0 0 14px 20px;
    }

    .blog-post-titel {
      font-family: 'Permanent Marker', cursive;
      font-size: 22px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .blog-post-datum {
      font-size: 12px;
      color: #9e9085;
      font-style: italic;
      margin-bottom: 18px;
    }

    /* ── FILMS ── */
    .film-grid {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .film-grid::-webkit-scrollbar { height: 6px; }
    .film-grid::-webkit-scrollbar-track { background: var(--licht-accent); }
    .film-grid::-webkit-scrollbar-thumb { background: var(--lijn); border-radius: 3px; }

    .film-kaart {
      flex: 0 0 auto;
      width: 120px;
      text-align: left;
      cursor: pointer;
    }

    .film-poster-wrap {
      width: 120px;
      height: 180px;
      border: var(--schets-lijn);
      background: var(--licht-accent);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .film-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .film-poster-placeholder { font-size: 36px; opacity: 0.4; }

    .film-info { margin-top: 6px; }

    .film-titel {
      font-size: 11px;
      font-weight: bold;
      color: var(--potlood);
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .film-jaar {
      font-size: 10px;
      color: var(--lijn);
      margin-top: 2px;
    }

    .film-sterren {
      font-size: 11px;
      color: #d4a017;
      margin-top: 2px;
    }

    /* ── RECEPTEN META ── */
    .recept-meta {
      display: flex;
      gap: 16px;
      margin-bottom: 18px;
      font-size: 12px;
      color: #6b6055;
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="avatar-box">&#128100;</div>
    <div class="header-info">
      <h1>Maarten van der Blij</h1>
      <p class="tagline">"mijn kleine hoekje van het internet"</p>
    </div>
  </div>

  <!-- RECENTE ACTIVITEIT -->
  <div class="sectie" id="activiteit">
    <div class="activiteit-header">
      <div class="activiteit-header-links">
        <span class="activiteit-header-icoon">📋</span>
        <span class="activiteit-header-titel">Recente activiteit</span>
      </div>
    </div>

    <div class="activiteit-tabs">
      <button class="activiteit-tab actief" data-filter="alles">Alles</button>
      <button class="activiteit-tab" data-filter="platenkast">💿 Platenkast</button>
      <button class="activiteit-tab" data-filter="recept">🔍 Recepten</button>
      <button class="activiteit-tab" data-filter="blog">✏️ Blog</button>
      <button class="activiteit-tab" data-filter="film">🎬 Films</button>
    </div>

    <div class="activiteit-lijst">

    </div>
  </div>

  <!-- PLATENKAST SECTIE -->
  <div class="sectie" id="cds">
    <div class="sectie-header">
      <span class="sectie-icon">&#128191;</span>
      <span class="sectie-titel">Mijn Platenkast</span>
    </div>
    <div class="sectie-body">
      <div id="platenkast-grid" class="platenkast-grid">
        <p class="placeholder">Platen worden geladen...</p>
      </div>
    </div>
  </div>

  <!-- FILM SECTIE -->
  <div class="sectie" id="films">
    <div class="sectie-header">
      <span class="sectie-icon">&#127909;</span>
      <span class="sectie-titel">Filmreviews</span>
    </div>
    <div class="sectie-body">
      <div id="film-grid" class="film-grid">
        <p class="placeholder">Films worden geladen...</p>
      </div>
    </div>
  </div>

  <!-- RECEPTEN SECTIE -->
  <div class="sectie" id="recepten">
    <div class="sectie-header">
      <span class="sectie-icon">&#127859;</span>
      <span class="sectie-titel">Favoriete Recepten</span>
    </div>
    <div class="sectie-body">
      <div id="recepten-lijst"></div>
      <div id="recepten-detail" style="display:none;">
        <button id="recepten-terug" style="
          background:none; border:none; cursor:pointer;
          color:var(--blauw); font-family:'Courier Prime',monospace;
          font-size:13px; font-style:italic; padding:0 0 14px 0;
        ">← terug naar overzicht</button>
        <div id="recepten-inhoud"></div>
      </div>
    </div>
  </div>

  <!-- BLOG SECTIE -->
  <div class="sectie" id="blog">
    <div class="sectie-header">
      <span class="sectie-icon">&#9997;&#65039;</span>
      <span class="sectie-titel">Blog</span>
    </div>
    <div class="sectie-body">
      <div id="blog-lijst"></div>
      <div id="blog-post-detail" style="display:none;">
        <button id="blog-terug" style="
          background:none; border:none; cursor:pointer;
          color:var(--blauw); font-family:'Courier Prime',monospace;
          font-size:13px; font-style:italic; padding:0 0 14px 0;
        ">← terug naar overzicht</button>
        <div id="blog-post-inhoud"></div>
      </div>
    </div>
  </div>

</div>


<script>
  function escape(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function relatieveTijd(dateStr) {
    const nu = new Date();
    const dan = new Date(dateStr);
    const diffMs = nu - dan;
    const diffDagen = Math.floor(diffMs / (1000 * 60 * 60 * 24));
    if (diffDagen === 0) return 'vandaag';
    if (diffDagen === 1) return 'gisteren';
    if (diffDagen < 7) return `${diffDagen} dagen geleden`;
    if (diffDagen < 14) return '1 week geleden';
    if (diffDagen < 30) return `${Math.floor(diffDagen / 7)} weken geleden`;
    if (diffDagen < 60) return '1 maand geleden';
    if (diffDagen < 365) return `${Math.floor(diffDagen / 30)} maanden geleden`;
    if (diffDagen < 730) return '1 jaar geleden';
    return `${Math.floor(diffDagen / 365)} jaar geleden`;
  }

  function vulActiviteit(releases) {
    const lijst = document.querySelector('.activiteit-lijst');
    const gesorteerd = [...releases].sort((a, b) => new Date(b.date_added) - new Date(a.date_added));

    if (gesorteerd.length === 0) {
      lijst.innerHTML = '<p class="placeholder" style="padding:16px">Nog geen activiteit beschikbaar.</p>';
      return;
    }

    lijst.innerHTML = gesorteerd.slice(0, 5).map(r => {
      const cover = r.thumb || r.cover_image;
      const icoonHtml = cover
        ? `<img src="${escape(cover)}" alt="${escape(r.artist)}" style="width:52px;height:52px;object-fit:cover;border-radius:2px;">`
        : '💿';
      return `
        <div class="activiteit-item" data-type="platenkast">
          <div class="activiteit-icoon">${icoonHtml}</div>
          <div class="activiteit-content">
            <div class="activiteit-meta">
              <span class="activiteit-badge platenkast">Platenkast</span>
              <span class="activiteit-tijd">${relatieveTijd(r.date_added)}</span>
            </div>
            <div class="activiteit-titel">${escape(r.artist)} – ${escape(r.title)}</div>
            ${r.year ? `<div class="activiteit-tags"><span class="activiteit-tag">${escape(String(r.year))}</span></div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  async function laadPlatenkast() {
    const grid = document.getElementById('platenkast-grid');
    try {
      const resp = await fetch('/api/discogs');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      if (!data.releases || data.releases.length === 0) {
        grid.innerHTML = '<p class="placeholder">Nog geen platen beschikbaar.</p>';
        return;
      }

      grid.innerHTML = data.releases.map(r => {
        const cover = r.cover_image || r.thumb;
        const coverHtml = cover
          ? `<img class="plaat-cover" src="${escape(cover)}" alt="${escape(r.title)}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=plaat-cover-placeholder>&#128191;</span>'">`
          : `<span class="plaat-cover-placeholder">&#128191;</span>`;
        return `
          <div class="plaat-kaart">
            <div class="plaat-cover-wrap">${coverHtml}</div>
            <div class="plaat-info">
              <div class="plaat-artiest">${escape(r.artist)}</div>
              <div class="plaat-titel">${escape(r.title)}</div>
              ${r.year ? `<div class="plaat-jaar">${escape(r.year)}</div>` : ''}
            </div>
          </div>`;
      }).join('');

      vulActiviteit(data.releases);
    } catch (e) {
      console.error('Platenkast fout:', e);
      grid.innerHTML = '<p class="placeholder">Platen konden niet worden geladen.</p>';
    }
  }

  function datumLabel(dateStr) {
    if (!dateStr) return '';
    return new Date(dateStr).toLocaleDateString('nl-NL', {day:'numeric', month:'long', year:'numeric'});
  }

  function voegContentAanActiviteit(items, type, icoon, label, sectieId) {
    const lijst = document.querySelector('.activiteit-lijst');
    const nieuweItems = items.map(p => `
      <div class="activiteit-item" data-type="${type}" data-date="${p.date || ''}">
        <div class="activiteit-icoon">${icoon}</div>
        <div class="activiteit-content">
          <div class="activiteit-meta">
            <span class="activiteit-badge ${type}">${label}</span>
            <span class="activiteit-tijd">${p.date ? relatieveTijd(p.date) : ''}</span>
          </div>
          <div class="activiteit-titel">${escape(p.title)}</div>
          ${p.excerpt ? `<div class="activiteit-beschrijving">${escape(p.excerpt)}</div>` : ''}
          <a class="activiteit-link" href="#${sectieId}" onclick="setTimeout(()=>document.querySelector('#${sectieId}-lijst [data-slug=\\'${escape(p.slug)}\\']')?.click(),50)">Bekijk →</a>
        </div>
      </div>`).join('');

    const tijdelijk = document.createElement('div');
    tijdelijk.innerHTML = lijst.innerHTML + nieuweItems;
    const alleItems = Array.from(tijdelijk.querySelectorAll('.activiteit-item'));
    alleItems.sort((a, b) => new Date(b.dataset.date || 0) - new Date(a.dataset.date || 0));
    lijst.innerHTML = alleItems.slice(0, 5).map(el => el.outerHTML).join('');

    const actieveTab = document.querySelector('.activiteit-tab.actief');
    if (actieveTab) {
      const filter = actieveTab.dataset.filter;
      document.querySelectorAll('.activiteit-item').forEach(item => {
        item.style.display = (filter === 'alles' || item.dataset.type === filter) ? 'flex' : 'none';
      });
    }
  }

  function toonContentDetail(slug, items, lijstId, detailId, inhoudId, sectieId) {
    const item = items.find(p => p.slug === slug);
    if (!item) return;
    document.getElementById(lijstId).style.display = 'none';
    document.getElementById(detailId).style.display = 'block';

    const isRecept = item.tags.includes('recept');
    const metaHtml = isRecept && (item.porties || item.bereidingstijd) ? `
      <div class="recept-meta">
        ${item.porties        ? `<span>&#127859; ${escape(String(item.porties))} porties</span>` : ''}
        ${item.bereidingstijd ? `<span>&#9201; ${escape(item.bereidingstijd)}</span>` : ''}
      </div>` : '';

    document.getElementById(inhoudId).innerHTML = `
      <div class="blog-post-titel">${escape(item.title)}</div>
      <div class="blog-post-datum">${datumLabel(item.date)}</div>
      ${metaHtml}
      <div class="blog-post-inhoud">${item.html}</div>`;
    document.getElementById(sectieId).scrollIntoView({ behavior: 'smooth' });
  }

  function initialiseerLijst(lijstId, detailId, inhoudId, terugId, sectieId, items) {
    const lijst = document.getElementById(lijstId);
    lijst.innerHTML = items.map(p => `
      <div class="blog-item" data-slug="${escape(p.slug)}">
        <div class="blog-item-datum">${datumLabel(p.date)}</div>
        <div class="blog-item-titel">${escape(p.title)}</div>
        ${p.excerpt ? `<div class="blog-item-excerpt">${escape(p.excerpt)}</div>` : ''}
        ${p.tags.length ? `<div class="blog-item-tags">${p.tags.map(t => `<span class="activiteit-tag">${escape(t)}</span>`).join('')}</div>` : ''}
      </div>`).join('');

    lijst.querySelectorAll('.blog-item').forEach(el => {
      el.addEventListener('click', () =>
        toonContentDetail(el.dataset.slug, items, lijstId, detailId, inhoudId, sectieId));
    });

    document.getElementById(terugId).addEventListener('click', () => {
      document.getElementById(detailId).style.display = 'none';
      document.getElementById(lijstId).style.display = 'block';
    });
  }

  async function laadBlog() {
    const lijst = document.getElementById('blog-lijst');
    try {
      const resp = await fetch('/api/content?tag=blog');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const posts = await resp.json();

      if (posts.length === 0) {
        lijst.innerHTML = '<p class="placeholder">Nog geen blogposts.</p>';
        return;
      }

      initialiseerLijst('blog-lijst', 'blog-post-detail', 'blog-post-inhoud', 'blog-terug', 'blog', posts);
      voegContentAanActiviteit(posts, 'blog', '✏️', 'Blog', 'blog');
    } catch (e) {
      console.error('Blog fout:', e);
      lijst.innerHTML = '<p class="placeholder">Posts konden niet worden geladen.</p>';
    }
  }

  async function laadRecepten() {
    const lijst = document.getElementById('recepten-lijst');
    try {
      const resp = await fetch('/api/content?tag=recept');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const recepten = await resp.json();

      if (recepten.length === 0) {
        lijst.innerHTML = '<p class="placeholder">Nog geen recepten.</p>';
        return;
      }

      initialiseerLijst('recepten-lijst', 'recepten-detail', 'recepten-inhoud', 'recepten-terug', 'recepten', recepten);
      voegContentAanActiviteit(recepten, 'recept', '&#127859;', 'Recept', 'recepten');
    } catch (e) {
      console.error('Recepten fout:', e);
      lijst.innerHTML = '<p class="placeholder">Recepten konden niet worden geladen.</p>';
    }
  }

  function ratingNaarSterren(rating) {
    if (!rating) return '';
    const vol  = Math.floor(rating);
    const half = (rating % 1) >= 0.5;
    return '★'.repeat(vol) + (half ? '½' : '');
  }

  async function laadFilms() {
    const grid = document.getElementById('film-grid');
    try {
      const resp = await fetch('/api/letterboxd');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      if (!data.entries || data.entries.length === 0) {
        grid.innerHTML = '<p class="placeholder">Nog geen films beschikbaar.</p>';
        return;
      }

      const recente = data.entries.slice(0, 10);

      grid.innerHTML = recente.map(f => {
        const posterHtml = f.posterUrl
          ? `<img class="film-poster" src="${escape(f.posterUrl)}" alt="${escape(f.filmTitle)}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=film-poster-placeholder>&#127909;</span>'">`
          : `<span class="film-poster-placeholder">&#127909;</span>`;
        const sterren = ratingNaarSterren(f.rating);
        const href = f.letterboxdUrl ? ` onclick="window.open('${escape(f.letterboxdUrl)}','_blank')"` : '';
        return `
          <div class="film-kaart"${href}>
            <div class="film-poster-wrap">${posterHtml}</div>
            <div class="film-info">
              <div class="film-titel">${escape(f.filmTitle)}</div>
              ${f.filmYear ? `<div class="film-jaar">${escape(String(f.filmYear))}</div>` : ''}
              ${sterren ? `<div class="film-sterren">${sterren}</div>` : ''}
            </div>
          </div>`;
      }).join('');

      // Voeg toe aan activiteitsfeed
      const lijst = document.querySelector('.activiteit-lijst');
      const filmItems = recente.map(f => {
        const posterHtml = f.posterUrl
          ? `<img src="${escape(f.posterUrl)}" alt="${escape(f.filmTitle)}" style="width:52px;height:52px;object-fit:cover;border-radius:2px;">`
          : '🎬';
        const sterren = ratingNaarSterren(f.rating);
        return `
          <div class="activiteit-item" data-type="film" data-date="${escape(f.watchedDate || f.pubDate || '')}">
            <div class="activiteit-icoon">${posterHtml}</div>
            <div class="activiteit-content">
              <div class="activiteit-meta">
                <span class="activiteit-badge film">Film</span>
                <span class="activiteit-tijd">${f.watchedDate ? relatieveTijd(f.watchedDate) : ''}</span>
              </div>
              <div class="activiteit-titel">${escape(f.filmTitle)}${f.filmYear ? ` (${escape(String(f.filmYear))})` : ''}</div>
              ${sterren ? `<div class="activiteit-sterren">${sterren}</div>` : ''}
            </div>
          </div>`;
      }).join('');

      const tijdelijk = document.createElement('div');
      tijdelijk.innerHTML = lijst.innerHTML + filmItems;
      const alleItems = Array.from(tijdelijk.querySelectorAll('.activiteit-item'));
      alleItems.sort((a, b) => new Date(b.dataset.date || 0) - new Date(a.dataset.date || 0));
      lijst.innerHTML = alleItems.slice(0, 5).map(el => el.outerHTML).join('');

      const actieveTab = document.querySelector('.activiteit-tab.actief');
      if (actieveTab) {
        const filter = actieveTab.dataset.filter;
        document.querySelectorAll('.activiteit-item').forEach(item => {
          item.style.display = (filter === 'alles' || item.dataset.type === filter) ? 'flex' : 'none';
        });
      }
    } catch (e) {
      console.error('Films fout:', e);
      grid.innerHTML = '<p class="placeholder">Films konden niet worden geladen.</p>';
    }
  }

  laadPlatenkast();
  laadBlog();
  laadRecepten();
  laadFilms();

  // Activiteit tab filtering
  document.querySelectorAll('.activiteit-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.activiteit-tab').forEach(t => t.classList.remove('actief'));
      tab.classList.add('actief');
      const filter = tab.dataset.filter;
      document.querySelectorAll('.activiteit-item').forEach(item => {
        item.style.display = (filter === 'alles' || item.dataset.type === filter) ? 'flex' : 'none';
      });
    });
  });
</script>
</body>
</html>
